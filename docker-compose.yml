# ──────────────────────────────────────────────────────────
# Named Volumes — 데이터 영속성
# ──────────────────────────────────────────────────────────
volumes:
  tailscale-state:
    driver: local
  chromadb-persistence:
    driver: local

# ──────────────────────────────────────────────────────────
# Networks — 내부 서비스 전용 브리지 네트워크
# ──────────────────────────────────────────────────────────
networks:
  core-internal:
    driver: bridge
