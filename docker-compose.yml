# ============================================================
# DomClaw — Docker Compose Stack (v2026.2)
# M2 MacBook Pro 최적화 OpenClaw + Traefik + Tailscale 통합
# OpenCode는 호스트에서 실행 (Docker 컨테이너 아님)
# ============================================================

services:
  # ──────────────────────────────────────────────────────────
  # 1. Tailscale — Zero-Trust 네트워크 게이트웨이
  # ──────────────────────────────────────────────────────────
  tailscale:
    image: tailscale/tailscale:latest
    container_name: domclaw-tailscale
    hostname: ${TS_HOSTNAME:-ai-commander}
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      # 태그는 Tailscale 관리 콘솔에서 먼저 생성 필요
      # - TS_EXTRA_ARGS=--advertise-tags=tag:domclaw
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./config/tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────────────────
  # 2. Traefik v3 — 도메인 기반 지능형 라우터
  # ──────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: domclaw-traefik
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--providers.docker=false"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    depends_on:
      tailscale:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - core-internal
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    labels:
      - "traefik.enable=true"

  # ──────────────────────────────────────────────────────────
  # 3. OpenClaw Gateway — 메인 에이전트 엔진
  # ──────────────────────────────────────────────────────────
  openclaw-gateway:
    # ARM64/Apple Silicon 지원 이미지
    image: smanx/openclaw:latest
    container_name: domclaw-gateway
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      tailscale:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      # smanx/openclaw 이미지 기본 포트: 18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      # Host OpenCode HTTP API
      - OPENCODE_BASE_URL=http://host.docker.internal:${OPENCODE_PORT:-4096}
    volumes:
      - ${OPENCLAW_DATA_HOST_PATH}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_PATH}:/home/node/.openclaw/workspace:rw
    deploy:
      resources:
        limits:
          memory: ${GATEWAY_MEMORY_LIMIT:-4G}
          cpus: "4.0"
        reservations:
          memory: 512M
          cpus: "1.0"
    networks:
      - core-internal
    labels:
      # ---- Public Router: Discord 웹훅 수신 ----
      - "traefik.enable=true"
      - "traefik.http.routers.bot-public.rule=Host(`agent.${TAILNET_DOMAIN}`)"
      - "traefik.http.routers.bot-public.entrypoints=websecure"
      - "traefik.http.routers.bot-public.middlewares=discord-allowlist@file,rate-limit@file,security-headers@file"
      - "traefik.http.services.bot-public.loadbalancer.server.port=18789"
      # ---- Admin Router: 대시보드 (외부 MagicDNS 접근) ----
      - "traefik.http.routers.admin.rule=Host(`${TAILNET_DOMAIN}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.middlewares=security-headers@file"
      - "traefik.http.services.admin.loadbalancer.server.port=18789"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "http.get(''http://localhost:18789/health'',(r)=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # 4. Host OpenCode 연동 가이드
  # ──────────────────────────────────────────────────────────
  # OpenCode는 Docker 컨테이너가 아닌 호스트에서 실행
  #
  # 실행 명령어:
  #   opencode serve --hostname 0.0.0.0 --port 4096 --cors http://localhost:3100
  #   또는
  #   opencode web --hostname 0.0.0.0 --port 4096 --cors http://localhost:3100
  #
  # 인증 추가:
  #   OPENCODE_SERVER_PASSWORD=your-password opencode serve --hostname 0.0.0.0 --port 4096
  #
  # OpenAPI 문서: http://localhost:4096/doc
  # ──────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────
  # 5. SyntheNode — DISABLED (개발 중, GitHub에 아직 없음)
